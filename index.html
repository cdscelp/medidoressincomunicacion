<html lang="es">
<head>

    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin=""/>
    
    <!-- MarkerCluster CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />

    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.85);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent-red: #ef4444;
            --accent-yellow: #eab308;
            --accent-blue: #3b82f6;
            --border-color: rgba(255, 255, 255, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* Sidebar Container */
        .sidebar {
            width: 350px;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            z-index: 1000;
            box-shadow: 4px 0 24px rgba(0,0,0,0.5);
            overflow-y: auto;
        }

        .header {
            margin-bottom: 24px;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 700;
            background: linear-gradient(90deg, #60a5fa, #c084fc);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .header p {
            font-size: 13px;
            color: var(--text-muted);
        }

        /* Theme Toggle Button */
        .theme-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 8px;
            cursor: pointer;
            color: var(--text-main);
            transition: all 0.2s;
        }
        .theme-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Light Theme */
        body.light-theme {
            --bg-dark: #f1f5f9;
            --bg-panel: rgba(255, 255, 255, 0.9);
            --text-main: #1e293b;
            --text-muted: #64748b;
            --border-color: rgba(0, 0, 0, 0.1);
        }
        body.light-theme .sidebar {
            box-shadow: 4px 0 24px rgba(0,0,0,0.1);
        }
        body.light-theme .medidor-item {
            background: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(0,0,0,0.1);
        }
        body.light-theme .medidor-item:hover {
            background: rgba(255, 255, 255, 0.9);
            border-color: var(--accent-blue);
        }
        body.light-theme .kpi-card,
        body.light-theme .search-input {
            background: rgba(255, 255, 255, 0.7);
            border-color: rgba(0,0,0,0.1);
        }
        body.light-theme .header h1 {
            background: linear-gradient(90deg, #2563eb, #7c3aed);
            -webkit-background-clip: text;
            background-clip: text;
        }

        /* File Upload */
        .upload-container {
            margin-bottom: 24px;
            padding: 16px;
            background: rgba(59, 130, 246, 0.1);
            border: 1px dashed var(--accent-blue);
            border-radius: 8px;
            text-align: center;
            cursor: pointer;
            transition: background 0.2s;
        }

        .upload-container:hover {
            background: rgba(59, 130, 246, 0.2);
        }

        .upload-label {
            display: block;
            cursor: pointer;
            color: var(--accent-blue);
            font-weight: 600;
            font-size: 14px;
        }
        
        .upload-label svg {
            vertical-align: middle;
            margin-right: 6px;
        }

        #csv-upload {
            display: none;
        }

        /* KPI Cards */
        .kpi-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 24px;
        }

        .kpi-card {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .kpi-title {
            font-size: 12px;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .kpi-value {
            font-size: 24px;
            font-weight: 700;
        }

        /* Search Box */
        .search-container {
            margin-bottom: 16px;
        }
        .search-input {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.6);
            color: var(--text-main);
            outline: none;
            font-size: 14px;
            transition: border-color 0.2s;
        }
        .search-input:focus {
            border-color: var(--accent-blue);
        }

        /* List container */
        .list-header {
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 16px;
            padding-bottom: 8px;
            border-bottom: 1px solid var(--border-color);
        }

        .medidor-list {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .medidor-item {
            background: rgba(15, 23, 42, 0.4);
            border: 1px solid transparent;
            border-radius: 8px;
            padding: 12px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .medidor-item:hover {
            background: rgba(30, 41, 59, 0.8);
            border-color: var(--accent-blue);
        }

        .medidor-item strong {
            display: block;
            font-size: 14px;
            margin-bottom: 4px;
            color: #fff;
        }

        /* Status colors */
        .status-badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 12px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 6px;
        }

        .status-sc { background: rgba(239, 68, 68, 0.2); color: var(--accent-red); }
        .status-la { background: rgba(234, 179, 8, 0.2); color: var(--accent-yellow); }
        .status-other { background: rgba(59, 130, 246, 0.2); color: var(--accent-blue); }

        /* Map Container */
        .map-container {
            flex: 1;
            position: relative;
        }

        #map {
            width: 100%;
            height: 100%;
            background-color: #e5e5e5;
        }

        /* Leaflet Overrides */
        .leaflet-popup-content-wrapper {
            background: rgba(30, 41, 59, 0.95) !important;
            backdrop-filter: blur(8px);
            color: #fff !important;
            border-radius: 12px !important;
            border: 1px solid var(--border-color);
            box-shadow: 0 10px 25px rgba(0,0,0,0.5) !important;
        }
        
        .leaflet-popup-tip {
            background: rgba(30, 41, 59, 0.95) !important;
        }

        .popup-content {
            font-family: 'Inter', sans-serif;
        }

        .popup-content h3 {
            font-size: 16px;
            margin-bottom: 8px;
            color: var(--accent-blue);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 6px;
        }

        .popup-row {
            display: flex;
            margin-bottom: 6px;
            font-size: 13px;
        }

        .popup-row span.label {
            color: var(--text-muted);
            width: 100px;
            font-weight: 600;
        }

        .popup-row span.val {
            flex: 1;
            color: #f8fafc;
        }
        
        #empty-state {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(30, 41, 59, 0.9);
            padding: 32px;
            border-radius: 12px;
            text-align: center;
            z-index: 1000;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(8px);
        }
        #empty-state h2 { margin-bottom: 16px; color: #fff; }
        #empty-state p { color: var(--text-muted); }

    </style>
</head>

;
        
        // URL del archivo CSV en Gist (GitHub)
        const CSV_URL = 'https://gist.githubusercontent.com/cdscelp/5e3212303519a45c522179946f52adcf/raw/9bd1ad9efe9abf65363774328cc07e2edef8aade/gistfile1.txt';

        // Función para cargar el CSV desde GitHub
        async function fetchCSVFromUrl(url) {
            try {
                console.log('Cargando CSV desde:', url);
                const response = await fetch(url);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const text = await response.text();
                
                // Verificar que es CSV válido
                if (text.includes('Reporte de Terminales') || text.includes('Nro. de Serie')) {
                    return text;
                }
                throw new Error('El archivo no parece ser un CSV válido');
            } catch (err) {
                throw new Error(`Error al cargar CSV: ${err.message}`);
            }
        }

        let medidoresData = [];
        let validMedidores = [];
        let map;
        let markersGroup;

        document.addEventListener('DOMContentLoaded', () => {
            // Theme Toggle
            const themeToggle = document.getElementById('theme-toggle');
            const themeIcon = document.getElementById('theme-icon');
            
            // Check for saved theme preference
            const savedTheme = localStorage.getItem('theme');
            if (savedTheme === 'light') {
                document.body.classList.add('light-theme');
                themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
            }
            
            themeToggle.addEventListener('click', () => {
                document.body.classList.toggle('light-theme');
                const isLight = document.body.classList.contains('light-theme');
                
                // Save preference
                localStorage.setItem('theme', isLight ? 'light' : 'dark');
                
                // Update icon
                if (isLight) {
                    themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z"></path>';
                } else {
                    themeIcon.innerHTML = '<path stroke-linecap="round" stroke-linejoin="round" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z"></path>';
                }
                
                // Refresh markers to update cluster icons
                if (markersGroup) {
                    markersGroup.refreshClusters();
                }
            });

            // Initialize Map with street tiles
            map = L.map('map').setView([-33.89, -60.57], 11); 
            
            L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> contributors',
                maxZoom: 19
            }).addTo(map);

            markersGroup = L.markerClusterGroup({
                iconCreateFunction: function(cluster) {
                    const isLight = document.body.classList.contains('light-theme');
                    return L.divIcon({ 
                        html: '<div style="background: rgba(59, 130, 246, 0.8); color: white; width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; border: 2px solid ' + (isLight ? '#fff' : 'white') + '; box-shadow: 0 0 10px rgba(0,0,0,0.5);">' + cluster.getChildCount() + '</div>',
                        className: 'custom-cluster-icon', 
                        iconSize: L.point(40, 40) 
                    });
                }
            });
            map.addLayer(markersGroup);

            // Mostrar estado de carga
            document.getElementById('empty-state').innerHTML = `
                <h2>Cargando datos...</h2>
                <p>Conectando con el servidor...</p>
            `;

            // Auto-load CSV from GitHub
            fetchCSVFromUrl(CSV_URL)
                .then(text => {
                    parseCSV(text);
                })
                .catch(err => {
                    console.error("Error cargando CSV:", err);
                    document.getElementById('empty-state').innerHTML = `
                        <h2>Error al cargar datos</h2>
                        <p style="font-size: 14px; margin-top: 10px; line-height: 1.6;">
                        Error: ${err.message}<br><br>
                        <button onclick="location.reload()" style="padding: 8px 16px; background: #3b82f6; color: white; border: none; border-radius: 6px; cursor: pointer;">Reintentar</button>
                        </p>
                    `;
                });

            // Search input listener
            const searchInput = document.getElementById('search-input');
            if (searchInput) {
                searchInput.addEventListener('input', (e) => {
                    renderList(e.target.value);
                });
            }
        });

        function parseCSV(text) {
            const lines = text.split('\n');
            const newData = [];
            
            for (let i = 0; i < lines.length; i++) {
                let line = lines[i].trim();
                // Match rows starting with alphanumeric IDs like DIGA00037046
                if (line.match(/^[A-Z0-9]+;/)) {
                    const parts = line.split(';');
                    if (parts.length < 18) continue;
                    
                    const medidor = parts[0].trim();
                    const estado = parts[2].trim();
                    const ultimoRegistro = parts[3].trim();
                    const titular = parts[10].trim();
                    
                    let conectividad = "";
                    if (parts.length >= 19) {
                        conectividad = parts[18].trim();
                    }
                    const observaciones = conectividad ? 'Conectividad: ' + conectividad : '';

                    const obj = {
                        MEDIDOR: medidor,
                        ESTADO: estado,
                        "ULTIMA LECTURA": "-",
                        "FECHA/HORA": ultimoRegistro,
                        CLIENTE: titular,
                        OBSERVACIONES: observaciones,
                        coordenadas: "-",
                        UBICACION: "-",
                        BANDA: "-"
                    };

                    // Merge base coordinates
                    if (baseCoords[medidor]) {
                        obj.coordenadas = baseCoords[medidor].coords || "-";
                        obj.UBICACION = baseCoords[medidor].ub || "-";
                        obj.BANDA = baseCoords[medidor].banda || "-";
                    }

                    newData.push(obj);
                }
            }

            medidoresData = newData;
            updateDashboard();
        }

        function updateDashboard() {
            // Hide empty state
            document.getElementById('empty-state').style.display = 'none';
            
            // Clear previous markers
            markersGroup.clearLayers();
            validMedidores = [];

            let countTotal = 0;
            let countSC = 0;
            let countLA = 0;

            medidoresData.forEach(item => {
                countTotal++;
                
                const estado = item.ESTADO || '';
                let statusClass = 'status-other';
                if (estado.toLowerCase().includes('sin comunicacion')) {
                    countSC++;
                    statusClass = 'status-sc';
                } else if (estado.toLowerCase().includes('lectura anormal')) {
                    countLA++;
                    statusClass = 'status-la';
                }

                // Parse coordinates
                let lat = null, lng = null;
                if (item.coordenadas && item.coordenadas !== '-' && item.coordenadas !== '-, -') {
                    const parts = item.coordenadas.split(',');
                    if (parts.length === 2) {
                        lat = parseFloat(parts[0].trim());
                        lng = parseFloat(parts[1].trim());
                    }
                }

                if (lat && lng && !isNaN(lat) && !isNaN(lng)) {
                    validMedidores.push(item);

                    // Custom marker icon based on status
                    const isSC = statusClass === 'status-sc';
                    const markerColor = isSC ? '#ef4444' : (statusClass === 'status-la' ? '#eab308' : '#3b82f6');
                    
                    const customIcon = L.divIcon({
                        className: 'custom-pin',
                        html: '<svg width="30" height="30" viewBox="0 0 24 24" fill="' + markerColor + '" stroke="#fff" stroke-width="2"><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/><circle cx="12" cy="10" r="3" fill="#fff"/></svg>',
                        iconSize: [30, 30],
                        iconAnchor: [15, 30],
                        popupAnchor: [0, -30]
                    });

                    const marker = L.marker([lat, lng], { icon: customIcon });

                    const popupHtml = `
                        <div class="popup-content">
                            <h3>${item.MEDIDOR}</h3>
                            <div class="popup-row"><span class="label">Cliente:</span><span class="val">${item.CLIENTE || '-'}</span></div>
                            <div class="popup-row"><span class="label">Banda:</span><span class="val">${item.BANDA || '-'}</span></div>
                            <div class="popup-row"><span class="label">Ubicación:</span><span class="val">${item.UBICACION || '-'}</span></div>
                            <div class="popup-row"><span class="label">Estado:</span><span class="val" style="color: ${markerColor}; font-weight: 600;">${item.ESTADO || '-'}</span></div>
                            <div class="popup-row"><span class="label">Fecha/Hora:</span><span class="val">${item['FECHA/HORA'] || '-'}</span></div>
                            <div class="popup-row"><span class="label">Observaciones:</span><span class="val">${item.OBSERVACIONES || '-'}</span></div>
                        </div>
                    `;

                    marker.bindPopup(popupHtml);
                    markersGroup.addLayer(marker);
                    item._marker = marker;
                }
            });

            // If there are valid medidores, adjust bounds
            if (validMedidores.length > 0) {
                const group = new L.featureGroup(validMedidores.map(m => m._marker));
                map.fitBounds(group.getBounds(), { padding: [50, 50] });
            }

            // Update KPIs
            document.getElementById('kpi-total').textContent = countTotal;
            document.getElementById('kpi-sc').textContent = countSC;
            document.getElementById('kpi-la').textContent = countLA;

            renderList();
        }

        function renderList(query = '') {
            const listContainer = document.getElementById('medidor-list');
            listContainer.innerHTML = '';
            const lowerQuery = query.toLowerCase();
            let displayCount = 0;

            for (const item of medidoresData) {
                if (!item.MEDIDOR) continue;
                
                const medidorMatch = (item.MEDIDOR || '').toLowerCase().includes(lowerQuery);
                const clienteMatch = (item.CLIENTE || '').toLowerCase().includes(lowerQuery);
                
                if (query === '' || medidorMatch || clienteMatch) {
                    if (displayCount >= 150) continue; // Limit UI lag
                    displayCount++;
                    
                    let statusClass = 'status-other';
                    const estado = item.ESTADO || '';
                    if (estado.toLowerCase().includes('sin comunicacion')) statusClass = 'status-sc';
                    else if (estado.toLowerCase().includes('lectura anormal')) statusClass = 'status-la';

                    const listItem = document.createElement('div');
                    listItem.className = 'medidor-item';
                    listItem.innerHTML = `
                        <strong>${item.MEDIDOR}</strong>
                        <div style="color: #94a3b8; margin-bottom: 4px;">${item.CLIENTE || '-'}</div>
                        <span class="status-badge ${statusClass}">${estado || 'Desconocido'}</span>
                    `;
                    
                    if (item._marker) {
                        listItem.addEventListener('click', () => {
                            const parts = item.coordenadas.split(',');
                            const lat = parseFloat(parts[0].trim());
                            const lng = parseFloat(parts[1].trim());
                            map.flyTo([lat, lng], 16, { duration: 1.5 });
                            setTimeout(() => {
                                item._marker.openPopup();
                            }, 1500);
                        });
                    } else {
                        listItem.style.opacity = '0.5';
                        listItem.title = 'Sin coordenadas vÃ¡lidas';
                    }

                    listContainer.appendChild(listItem);
                }
            }
        }
    </script>
